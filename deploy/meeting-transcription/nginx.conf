# NeuType Meeting Transcription Nginx template.
#
# Install example:
#   sudo cp deploy/meeting-transcription/nginx.conf /etc/nginx/sites-available/neutype-meeting-transcription.conf
#   sudo ln -sf /etc/nginx/sites-available/neutype-meeting-transcription.conf /etc/nginx/sites-enabled/neutype-meeting-transcription.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace:
#   meeting-transcription.example.com
#   /etc/letsencrypt/live/meeting-transcription.example.com/...

server {
    listen 80;
    server_name meeting-transcription.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name meeting-transcription.example.com;

    ssl_certificate /etc/letsencrypt/live/meeting-transcription.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meeting-transcription.example.com/privkey.pem;

    # Meeting uploads can be large: live chunks + full-audio fallback.
    client_max_body_size 2048m;
    client_body_timeout 1800s;
    proxy_connect_timeout 60s;
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/meeting-transcription/ {
        # The app currently has no built-in public API authentication.
        # If this endpoint is internet-facing, put authentication, VPN, or IP
        # allowlisting in front of it before production rollout.

        proxy_pass http://127.0.0.1:8000/api/meeting-transcription/;
        proxy_http_version 1.1;

        # Avoid buffering large request bodies to disk before forwarding.
        proxy_request_buffering off;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

